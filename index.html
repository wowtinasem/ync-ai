<html lang="ko">

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
:root {
  --ai-color: #3654A5;
  --ai-bg: #EEF1F8;
  --ai-light: #D8DFEF;
  --speech-color: #EA580C;
  --speech-bg: #FFF7ED;
  --speech-light: #FFEDD5;
  --bg: #F0EDE8;
  --card: #FFFFFF;
  --text: #1A1A1A;
  --text-secondary: #6B7280;
  --text-tertiary: #9CA3AF;
  --border: #D8D5CF;
  --border-light: #EBE8E3;
  --accent: #1E3264;
  --kakao: #FEE500;
  --kakao-text: #191919;
  --new-badge: #DC2626;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 17px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-weight: 420;
}

/* ===== HEADER ===== */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(240,237,232,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 3px solid var(--accent);
  box-shadow: 0 2px 8px rgba(30,50,100,0.08);
}
.contact-bar {
  background:var(--accent); color:rgba(255,255,255,0.9);
  font-size:13px; font-weight:500; text-align:center;
  padding:6px 24px; letter-spacing:0.2px;
}
.contact-bar span { margin:0 10px; white-space:nowrap; }
.contact-bar strong { color:#fff; font-weight:700; }
.header-inner {
  max-width: 1200px; margin: 0 auto; padding:0 24px;
  display: flex; align-items: center; justify-content: space-between;
  height: 72px; gap:16px;
}
.logo-area { display:flex; align-items:center; gap:14px; flex-shrink:0; }
.logo-mark {
  width:44px; height:44px; background:var(--accent); border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-weight:800; font-size:17px; letter-spacing:-0.5px;
}
.logo-text { font-size:21px; font-weight:700; color:var(--text); letter-spacing:-0.3px; }

.header-nav { display:flex; gap:6px; }
.nav-btn {
  padding: 9px 18px; border-radius: var(--radius-sm);
  font-size: 15px; font-weight: 600; cursor: pointer;
  border: 1px solid var(--border); background: var(--card); color: var(--text);
  transition: all 0.15s; font-family:inherit;
}
.nav-btn:hover { background: var(--accent); color: #fff; border-color:var(--accent); }
.nav-btn.active { background: var(--accent); color: #fff; border-color:var(--accent); }

.kakao-header-btn {
  display:flex; align-items:center; gap:6px;
  padding: 9px 14px; border-radius: var(--radius-sm);
  background: var(--kakao); color: var(--kakao-text);
  border:none; cursor:pointer; font-size:14px; font-weight:600;
  font-family: inherit; transition: transform 0.15s, box-shadow 0.15s;
  margin-right:8px;
}
.kakao-header-btn:hover { transform:translateY(-1px); box-shadow: var(--shadow-md); }
.kakao-header-btn svg { width:18px; height:18px; }

/* ===== MAIN CONTENT ===== */
.main { max-width:1200px; margin:0 auto; padding:24px; }

/* Section titles */
.section-title {
  font-size:24px; font-weight:700; letter-spacing:-0.5px; margin-bottom:16px;
  display:flex; align-items:center; gap:8px;
}
.section-title .dot { width:8px; height:8px; border-radius:50%; }

/* ===== STATS BAR ===== */
.stats-bar {
  display:grid; grid-template-columns: repeat(4,1fr); gap:12px;
  margin-bottom:24px;
}
.stat-card {
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px 20px; box-shadow: var(--shadow-sm);
}
.stat-label { font-size:14px; color:var(--text-secondary); font-weight:500; margin-bottom:4px; }
.stat-value { font-size:28px; font-weight:700; letter-spacing:-1px; }
.stat-value.ai-val { color:var(--ai-color); }
.stat-value.speech-val { color:var(--speech-color); }

/* ===== CALENDAR ===== */
.calendar-container {
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius-lg); box-shadow: var(--shadow-sm);
  overflow:hidden; margin-bottom:24px;
}
.calendar-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 24px; border-bottom:1px solid var(--border-light);
}
.calendar-month { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
.calendar-nav { display:flex; gap:8px; }
.cal-nav-btn {
  width:36px; height:36px; border-radius:var(--radius-sm); border:1px solid var(--border);
  background:var(--card); cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition: all 0.15s; font-size:16px; color:var(--text-secondary);
}
.cal-nav-btn:hover { background:var(--border-light); color:var(--text); }

.calendar-legend {
  display:flex; gap:16px; padding:12px 24px; background:var(--border-light);
  border-bottom:1px solid var(--border);
}
.legend-item { display:flex; align-items:center; gap:6px; font-size:14px; color:var(--text); font-weight:600; }
.legend-dot { width:10px; height:10px; border-radius:3px; }
.legend-dot.ai { background:var(--ai-color); }
.legend-dot.speech { background:var(--speech-color); }
.legend-dot.new { background:var(--new-badge); }

.calendar-grid {
  display:grid; grid-template-columns:repeat(7,1fr);
}
.cal-day-header {
  padding:12px 8px; text-align:center; font-size:15px; font-weight:700;
  color:var(--text); border-bottom:1px solid var(--border-light);
  letter-spacing:0.3px;
}
.cal-day-header:first-child { color:#DC2626; }
.cal-day-header:last-child { color:#2563EB; }

.cal-cell {
  min-height:100px; padding:6px 8px; border:1px solid var(--border-light);
  cursor:pointer; transition: background 0.15s; position:relative;
  display:flex; flex-direction:column;
}
.cal-cell:hover { background:var(--border-light); }
.cal-cell.empty { cursor:default; background:transparent; }
.cal-cell.today { background:#FFFBEB; }
.cal-cell.selected { background:#F0F9FF; outline:2px solid var(--ai-color); outline-offset:-2px; }

.cal-date {
  font-size:15px; font-weight:600; margin-bottom:4px;
  display:flex; align-items:center; gap:4px;
}
.cal-cell:nth-child(7n+1) .cal-date { color:#DC2626; }
.cal-cell:nth-child(7n) .cal-date { color:#2563EB; }

.cal-events { display:flex; flex-direction:column; gap:2px; flex:1; }
.cal-event {
  font-size:12px; padding:2px 6px; border-radius:4px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  font-weight:500; line-height:1.4;
}
.cal-event.ai { background:var(--ai-bg); color:var(--ai-color); border-left:2px solid var(--ai-color); }
.cal-event.speech { background:var(--speech-bg); color:var(--speech-color); border-left:2px solid var(--speech-color); }
.cal-event-more {
  font-size:10px; color:var(--text-tertiary); font-weight:500;
  padding:2px 6px; cursor:pointer;
}
.new-badge {
  display:inline-block; font-size:9px; font-weight:700; color:#fff;
  background:var(--new-badge); border-radius:3px; padding:0 4px;
  line-height:1.6; letter-spacing:0.3px; vertical-align:middle;
}

/* ===== FILTER ===== */
.filter-bar {
  display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px;
  padding:16px 20px; background:var(--card); border:1px solid var(--border);
  border-radius:var(--radius); box-shadow:var(--shadow-sm);
}
.filter-select, .filter-input {
  padding:8px 12px; border:1px solid var(--border); border-radius:var(--radius-sm);
  font-family:inherit; font-size:14px; background:var(--card);
  color:var(--text); outline:none; transition: border-color 0.15s;
}
.filter-select:focus, .filter-input:focus { border-color:var(--ai-color); }
.filter-reset {
  padding:8px 16px; border:1px solid var(--border); border-radius:var(--radius-sm);
  background:transparent; cursor:pointer; font-family:inherit; font-size:14px;
  color:var(--text-secondary); transition:all 0.15s;
}
.filter-reset:hover { background:var(--border-light); color:var(--text); }

/* ===== DAY DETAIL PANEL ===== */
.day-detail {
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg);
  box-shadow:var(--shadow-md); margin-bottom:24px; overflow:hidden;
  animation: slideDown 0.25s ease;
}
@keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

.day-detail-header {
  padding:16px 24px; border-bottom:1px solid var(--border-light);
  display:flex; justify-content:space-between; align-items:center;
}
.day-detail-title { font-size:20px; font-weight:700; }
.day-detail-close {
  width:32px; height:32px; border-radius:50%; border:1px solid var(--border);
  background:transparent; cursor:pointer; font-size:18px; color:var(--text-secondary);
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s;
}
.day-detail-close:hover { background:var(--border-light); color:var(--text); }
.day-detail-coordinator {
  padding:10px 24px; background:#F0F7FF; border-bottom:1px solid var(--border-light);
  font-size:14px; color:var(--accent); display:flex; align-items:center; gap:8px;
}
.day-detail-coordinator .coord-label {
  font-weight:700; white-space:nowrap;
}
.day-detail-coordinator .coord-names {
  font-weight:500;
}

.class-card {
  padding:16px 24px; border-bottom:1px solid var(--border-light);
  display:grid; grid-template-columns:auto 1fr auto; gap:16px; align-items:center;
  transition:background 0.15s; cursor:pointer;
}
.class-card:hover { background:var(--border-light); }
.class-card:last-child { border-bottom:none; }

.class-type-badge {
  padding:4px 10px; border-radius:6px; font-size:14px; font-weight:700;
  white-space:nowrap; letter-spacing:0.3px;
}
.class-type-badge.ai { background:var(--ai-bg); color:var(--ai-color); }
.class-type-badge.speech { background:var(--speech-bg); color:var(--speech-color); }

.class-info { }
.class-dept { font-size:17px; font-weight:600; margin-bottom:2px; display:flex; align-items:center; gap:6px; }
.class-meta { font-size:15px; color:var(--text-secondary); display:flex; gap:12px; flex-wrap:wrap; }
.class-meta span { display:flex; align-items:center; gap:4px; }
.class-students { font-size:16px; font-weight:600; color:var(--text-secondary); white-space:nowrap; }

/* ===== DEPT MODAL ===== */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200;
  display:flex; align-items:center; justify-content:center; padding:24px;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.modal {
  background:var(--card); border-radius:var(--radius-lg); width:100%; max-width:560px;
  max-height:80vh; overflow-y:auto; box-shadow:var(--shadow-lg);
  animation: modalIn 0.25s ease;
}
@keyframes modalIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }

.modal-header {
  padding:24px; border-bottom:1px solid var(--border-light);
  display:flex; justify-content:space-between; align-items:flex-start;
}
.modal-dept-name { font-size:24px; font-weight:700; letter-spacing:-0.5px; }
.modal-dept-sub { font-size:15px; color:var(--text-secondary); margin-top:4px; }
.modal-close {
  width:36px; height:36px; border-radius:50%; border:1px solid var(--border);
  background:transparent; cursor:pointer; font-size:18px; color:var(--text-secondary);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  transition:all 0.15s;
}
.modal-close:hover { background:var(--border-light); color:var(--text); }

.modal-section { padding:20px 24px; border-bottom:1px solid var(--border-light); }
.modal-section:last-child { border-bottom:none; }
.modal-section-title { font-size:13px; font-weight:600; color:var(--text-secondary); margin-bottom:12px; text-transform:uppercase; letter-spacing:0.5px; }

.modal-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.modal-info-item { }
.modal-info-label { font-size:13px; color:var(--text-tertiary); font-weight:500; }
.modal-info-value { font-size:16px; font-weight:500; margin-top:2px; }

.modal-schedule { display:flex; flex-direction:column; gap:10px; }
.modal-sched-item {
  padding:12px; border-radius:var(--radius-sm); display:flex; gap:12px; align-items:flex-start;
}
.modal-sched-item.ai { background:var(--ai-bg); }
.modal-sched-item.speech { background:var(--speech-bg); }
.modal-sched-tag { font-size:11px; font-weight:700; white-space:nowrap; padding:2px 8px; border-radius:4px; }
.modal-sched-tag.ai { background:var(--ai-color); color:#fff; }
.modal-sched-tag.speech { background:var(--speech-color); color:#fff; }
.modal-sched-detail { font-size:15px; line-height:1.5; }
.modal-sched-detail strong { font-weight:600; }

/* ===== TABS ===== */
.tab-section {
  display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px;
}
.tab-card {
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg);
  box-shadow:var(--shadow-sm); overflow:hidden;
}
.tab-card-header {
  padding:16px 20px; border-bottom:1px solid var(--border-light);
  font-size:19px; font-weight:700; display:flex; align-items:center; gap:8px;
}
.tab-card-header .icon { font-size:20px; }
.tab-card-body { padding:16px 20px; }

.res-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.res-col {
  border-radius:var(--radius); padding:20px;
}
.res-col.ai-col { background:var(--ai-bg); border:1px solid var(--ai-light); }
.res-col.sp-col { background:var(--speech-bg); border:1px solid var(--speech-light); }
.res-col-title {
  font-size:18px; font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:8px;
}
.res-col-title.ai { color:var(--ai-color); }
.res-col-title.sp { color:var(--speech-color); }
.res-col-title .dot { width:12px; height:12px; border-radius:3px; }
.res-col-title .dot.ai { background:var(--ai-color); }
.res-col-title .dot.speech { background:var(--speech-color); }
.res-btns { display:flex; flex-direction:column; gap:10px; }
.res-btn {
  display:flex; align-items:center; justify-content:center; gap:10px; padding:14px 20px;
  border-radius:var(--radius-sm); cursor:pointer; text-decoration:none;
  font-family:inherit; font-size:17px; font-weight:700; transition:all 0.15s;
  border:none; outline:none;
}
.res-btn .icon { font-size:20px; }
.res-btn.canva-ai { background:var(--ai-color); color:#fff; }
.res-btn.canva-ai:hover { background:var(--accent); }
.res-btn.ppt-ai { background:var(--ai-light); color:var(--ai-color); }
.res-btn.ppt-ai:hover { background:var(--ai-color); color:#fff; }
.res-btn.canva-sp { background:var(--speech-color); color:#fff; }
.res-btn.canva-sp:hover { background:#C2410C; }
.res-btn.ppt-sp { background:var(--speech-light); color:var(--speech-color); }
.res-btn.ppt-sp:hover { background:var(--speech-color); color:#fff; }

.survey-col {
  background:#ECFDF5; border:1px solid #A7F3D0; border-radius:var(--radius); padding:20px;
}
.survey-col-title {
  font-size:18px; font-weight:700; margin-bottom:14px; color:#059669;
  display:flex; align-items:center; gap:8px;
}
.survey-col-title .dot { width:12px; height:12px; border-radius:3px; background:#059669; }
.survey-btns { display:flex; flex-direction:column; gap:10px; }
.survey-btn {
  display:flex; align-items:center; justify-content:center; gap:10px; padding:14px 20px;
  border-radius:var(--radius-sm); cursor:pointer; text-decoration:none;
  font-family:inherit; font-size:17px; font-weight:700; transition:all 0.15s;
  border:none; outline:none;
}
.survey-btn .icon { font-size:20px; }
.survey-btn.survey-ai { background:#059669; color:#fff; }
.survey-btn.survey-ai:hover { background:#047857; }
.survey-btn.survey-sp { background:#A7F3D0; color:#059669; }
.survey-btn.survey-sp:hover { background:#059669; color:#fff; }

@media(max-width:768px) {
  .res-grid { grid-template-columns:1fr; }
}

/* ===== FLOATING KAKAO ===== */
.kakao-float {
  position:fixed; bottom:24px; right:24px; z-index:150;
  width:56px; height:56px; border-radius:50%; background:var(--kakao);
  border:none; cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,0.15);
  display:flex; align-items:center; justify-content:center;
  transition:transform 0.2s, box-shadow 0.2s;
}
.kakao-float:hover { transform:translateY(-3px) scale(1.05); box-shadow:0 6px 24px rgba(0,0,0,0.2); }
.kakao-float svg { width:28px; height:28px; }

/* ===== FOOTER ===== */
.footer {
  max-width:1200px; margin:0 auto; padding:24px;
  border-top:1px solid var(--border); text-align:center;
  font-size:13px; color:var(--text-tertiary);
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px) {
  .header-inner { height:56px; }
  .header-nav { display:none; }
  .stats-bar { grid-template-columns:repeat(2,1fr); }
  .cal-cell { min-height:70px; padding:4px; }
  .cal-event { font-size:9px; padding:1px 4px; }
  .tab-section { grid-template-columns:1fr; }
  .filter-bar { flex-direction:column; }
  .class-card { grid-template-columns:1fr; gap:8px; }
  .modal-info-grid { grid-template-columns:1fr; }
}

/* Map link */
.map-link {
  cursor:pointer; text-decoration:underline; text-decoration-style:dotted;
  text-underline-offset:2px; color:var(--ai-color); transition:color 0.15s;
}
.map-link:hover { color:var(--accent); text-decoration-style:solid; }

/* ===== DEPT PANEL ===== */
.dept-panel {
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg);
  box-shadow:var(--shadow-sm); margin-bottom:24px; overflow:hidden;
}
.dept-panel-header {
  padding:16px 24px; border-bottom:1px solid var(--border-light);
  font-size:18px; font-weight:700; display:flex; align-items:center; gap:8px;
}
.dept-panel-body {
  display:grid; grid-template-columns:280px 1fr; min-height:320px;
}
.dept-sidebar {
  border-right:1px solid var(--border-light); padding:12px; overflow-y:auto; max-height:500px;
}
.dept-cat-label {
  font-size:11px; font-weight:700; color:var(--text-tertiary); padding:8px 8px 4px;
  text-transform:uppercase; letter-spacing:0.5px;
}
.dept-btn {
  display:block; width:100%; text-align:left; padding:8px 12px; border:none;
  background:transparent; cursor:pointer; font-family:inherit; font-size:15px;
  color:var(--text-secondary); border-radius:var(--radius-sm); transition:all 0.15s;
  margin-bottom:2px; font-weight:500;
}
.dept-btn:hover { background:var(--border-light); color:var(--text); }
.dept-btn.active { background:var(--accent); color:#fff; }
.dept-detail-area {
  padding:24px; display:flex; flex-direction:column; justify-content:center;
}
.dept-detail-empty {
  text-align:center; color:var(--text-tertiary); font-size:16px;
  display:flex; flex-direction:column; align-items:center; gap:8px;
}
.dept-detail-empty .icon { font-size:32px; }
.dept-detail-name {
  font-size:22px; font-weight:700; margin-bottom:4px; letter-spacing:-0.3px;
}
.dept-detail-cat {
  font-size:12px; color:var(--text-tertiary); margin-bottom:16px; font-weight:500;
}
.dept-detail-desc {
  font-size:16px; color:var(--text-secondary); line-height:1.8; margin-bottom:20px;
}
.dept-detail-stats {
  display:flex; gap:12px; flex-wrap:wrap;
}
.dept-detail-stat {

function getMonthData(mi) {
  const m = months[mi];
  if (!m) return null;
  return m;
}

function getDaysInMonth(year, month) {
  return new Date(year, month, 0).getDate();
}

function getFirstDayOfWeek(year, month) {
  return new Date(year, month-1, 1).getDay();
}

function getDateStr(year, month, day) {
  return `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

function getClassesForDate(dateStr) {
  return classData.filter(c => c.date === dateStr);
}

function getFilteredClasses(classes) {
  return classes.filter(c => {
    if (filterDept && c.dept !== filterDept) return false;
    if (filterType && c.type !== filterType) return false;
    if (filterBuilding && !c.place.includes(filterBuilding)) return false;
    return true;
  });
}

function getAllDepts() {
  return [...new Set(classData.map(c=>c.dept))].sort();
}

function getAllBuildings() {
  const buildings = new Set();
  classData.forEach(c => {
    const b = c.place.split(/\s/)[0];
    buildings.add(b);
  });
  return [...buildings].sort();
}

// 교시 계산 (주말, 비정규 시간은 제외)
function getPeriod(c) {
  if (c.day === '토' || c.day === '일') return '';
  const start = c.time.split('~')[0];
  const end = c.time.split('~')[1];
  if (!start || !end) return '';
  // 정규: XX:00 시작, XX:50 종료
  if (!start.endsWith(':00') || !end.endsWith(':50')) return '';
  const hour = parseInt(start.split(':')[0]);
  if (hour < 9 || hour > 17) return '';
  const period = hour - 8;
  return period + '교시';
}

function openDeptModal(dept) {
  const classes = classData.filter(c => c.dept === dept);
  if (!classes.length) return;

  const aiClasses = classes.filter(c=>c.type==='ai');
  const spClasses = classes.filter(c=>c.type==='speech');
  const profs = [...new Set(classes.map(c=>c.prof + '|' + c.phone))];

  let profInfo = '';
  profs.forEach(p => {
    const [name, phone] = p.split('|');
    profInfo += `<div class="modal-info-item">
      <div class="modal-info-label">담당교수</div>
      <div class="modal-info-value">${name}</div>
    </div>
    <div class="modal-info-item">
      <div class="modal-info-label">사무실</div>
      <div class="modal-info-value">${phone}</div>
    </div>`;
  });

  let schedItems = '';
  [...aiClasses, ...spClasses].sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time)).forEach(c => {
    schedItems += `<div class="modal-sched-item ${c.type}">
      <span class="modal-sched-tag ${c.type}">${c.type==='ai'?'AI':'스피치'}</span>
      <div class="modal-sched-detail">
        <strong>${c.date.replace('2026-','').replace('-','/')} (${c.day})</strong> ${c.time}${getPeriod(c) ? ' ('+getPeriod(c)+')' : ''}<br>
        <span class="map-link" onclick="event.stopPropagation();openNaverMap('${c.place}')" title="네이버 지도에서 보기">📍 ${c.place}</span> · 👥 ${c.students}명
      </div>
    </div>`;
  });

  const buildings = [...new Set(classes.map(c=>c.place.split(/\s/)[0]))].join(', ');

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
  overlay.innerHTML = `<div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-dept-name">${dept}</div>
        <div class="modal-dept-sub">AI활용 ${aiClasses.length}건 · 스피치 ${spClasses.length}건</div>
      </div>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    ${deptInfo[dept] ? `<div class="modal-section" style="background:var(--border-light);padding:16px 24px;">
      <div style="font-size:14px;color:var(--text-secondary);line-height:1.7;">${deptInfo[dept]}</div>
    </div>` : ''}
    <div class="modal-section">
      <div class="modal-section-title">기본 정보</div>
      <div class="modal-info-grid">
        ${profInfo}
        <div class="modal-info-item">
          <div class="modal-info-label">건물</div>
          <div class="modal-info-value"><span class="map-link" onclick="openNaverMap('${buildings}')" title="네이버 지도에서 보기">${buildings}</span></div>
        </div>
        <div class="modal-info-item">
          <div class="modal-info-label">전체 수업</div>
          <div class="modal-info-value">${classes.length}건</div>
        </div>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">수업 일정</div>
      <div class="modal-schedule">
        ${schedItems}
      </div>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

// Initial render
render();
</script>
</body>
</html>
